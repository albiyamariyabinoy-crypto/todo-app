<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=", initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <form method="POST">
    {% csrf_token %}
    <label for="Name">Name:</label><br>
    <input type="text" name="task-name" id="Name"><br>
    <label for="date">Date:</label><br>
    <input type="date" id="date" name="task-date">
    <button>Click here</button>
 </form> 
 <div>
    {% for i in item %}
       <p>{{i.taskname}}</p>
       <p>{{i.taskdate}}</p>
       <button><a href="{%url 'delete' i.id%}">delete</a></button>
       <button><a href="{%url 'update' i.id%}">update</a></button>   

    {% endfor %}
 </div>  
</body>
</html>
